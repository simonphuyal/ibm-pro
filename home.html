<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopVerse-Home Delivery</title>
    <style>
        body {
            background-color: #121212; 
            color: #ffffff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        
form {
    max-width: 400px;
    margin: 80px auto;
    background: #0d0d0d; 
    padding: 40px 30px;
    border-radius: 12px;
    border: 1px solid #333333; 
    box-shadow: 0 4px 20px rgba(255, 255, 255, 0.05);
}

form label {
    font-weight: 500;
    font-size: 14px;
    display: block;
    margin-bottom: 8px;
    color: #ffffff; 
}

form input[type="text"],
form input[type="email"],
form input[type="password"] {
    width: 100%;
    padding: 12px;
    margin-bottom: 24px;
    background-color: #1a1a1a; 
    border: 1px solid #444444; 
    color: #ffffff;            
    border-radius: 6px;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
}

form input:focus {
    border-color: #f3a847; 
    box-shadow: 0 0 8px rgba(243, 168, 71, 0.4);
}

form button {
    width: 100%;
    padding: 14px;
    background: #f0c14b;
    color: #111111;
    border: 1px solid #a88734;
    border-radius: 6px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
}

form button:hover {
    background: #eeb933;
}
    </style>    
</head>
<body>
    <form action="./success2.html">
        <label for ="Home Address">Home Address</label><Br>
            <input type="Home Address" id="Home Address" name="Home Address" value="" required><br>
        <label for ="Phone Number">Phone Number</label><br>
            <input type="Phone Number" id="Phone Number" name="Phone Number" value=""required><br>
            <button action="./sucess.html" >
                Send Item
            </button>
    </form> 
</body>
</html>
