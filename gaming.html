    <title>ShopVerse-Gaming</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: #000000; 
            color: #ffffff;
            line-height: 1.6;
            padding: 40px 20px; 
        }

        .gaming {
            display: flex;
            flex-direction: row;  
            flex-wrap: wrap; 
            gap: 30px;
            justify-content: center;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .gaming-one {
            background: #111111; 
            border: 1px solid #333333; 
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            width: 240px;
            padding: 20px;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .gaming-one:hover {
            transform: translateY(-8px);
            border-color: #f3a847;
        }

        .gaming-one p {
            font-size: 18px;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 15px;
        }

        .gaming-one img {
            width: 100%;
            height: 150px;
            object-fit: contain;
            border-radius: 6px;
            margin-bottom: 15px;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 10px 0;
            margin: 5px 0;
            border-radius: 20px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            text-align: center;
            transition: all 0.2s ease;
        }

        .btn-cart {
            background: #f0c14b;
            border: 1px solid #a88734;
            color: #111111;
        }

        .btn-cart:hover {
            background: #eeb933;
        }

        .btn-buy {
            background: #ed923b;
            border: 1px solid #a61;
            color: #ffffff;
        }

        .btn-buy:hover {
            background: #e48122;
        }
    </style>
</head>
