<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>ShopVerse-Furniture</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: #000000; 
            color: #ffffff;
            line-height: 1.6;
            padding: 40px 5%;
        }

        .furniture-container {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;    
            gap: 30px;          
            justify-content: center; 
        }

   
        .furniture-item {
            background: #111111; 
            border: 1px solid #333333; 
            border-radius: 12px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            width: 240px;       
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .furniture-item:hover {
            transform: translateY(-8px);
            border-color: #f3a847;
        }

        .furniture-item p {
            font-size: 18px;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 15px;
        }

        .furniture-item img {
            width: 100%;
            height: 180px;
            object-fit: contain; 
            border-radius: 6px;
            margin-bottom: 15px;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 10px 0;
            margin: 5px 0;
            border-radius: 20px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            text-align: center;
            transition: all 0.2s ease;
        }

        .btn-cart {
            background: #f0c14b;
            border: 1px solid #a88734;
            color: #111111;
        }

        .btn-cart:hover {
            background: #eeb933;
        }

        .btn-buy {
            background: #ed923b;
            border: 1px solid #a61;
            color: #ffffff;
        }

        .btn-buy:hover {
            background: #e48122;
        }
    </style>
</head>
<body>

    <div class="furniture-container">
    
        <div class="furniture-item">
            <p><b>Sofa</b></p>
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRBwaRLqQNBc_Q9S4IYK6Ll0j9-piwpC-I6EBkh5X0riQ&s=10">
            <a href="cart.html" class="btn btn-cart">Add to cart</a>
            <a href="buy.html" class="btn btn-buy">Buy the item</a>
        </div>

        <div class="furniture-item">
            <p><b>Bed</b></p>
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSOC603l4uwGOqWTuKmeLcpirEnZVAhvyvI7jp9HTyhPW0tqSzXbBJ-oWw&s=10">
            <a href="cart.html" class="btn btn-cart">Add to cart</a>
            <a href="buy.html" class="btn btn-buy">Buy the item</a>
        </div>

        <div class="furniture-item">
            <p><b>Dining Table</b></p>
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQb0RBZvpQ30inK3fS80a3hltRTog3AIWb5yYqDp1sKsfmri1cT1VQBRTw&s=10">
            <a href="cart.html" class="btn btn-cart">Add to cart</a>
            <a href="buy.html" class="btn btn-buy">Buy the item</a>
        </div>

        <div class="furniture-item">
            <p><b>Cupboard</b></p>
            <img src="https://th.bing.com/th/id/OIP.-nVKZMqK3T2l0KrinM7G1wHaHa?w=178&h=180&c=7&r=0&o=7&pid=1.7&rm=3">
            <a href="cart.html" class="btn btn-cart">Add to cart</a>
            <a href="buy.html" class="btn btn-buy">Buy the item</a>
        </div>

        <div class="furniture-item">
            <p><b>Study Table</b></p>
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQZFcJvfS67NBnGCctlaGUZNe2zCPtICWjQ9mwWCXiO0w&s=10">
            <a href="cart.html" class="btn btn-cart">Add to cart</a>
            <a href="buy.html" class="btn btn-buy">Buy the item</a>
        </div>

    </div>
    
</body>
</html>
